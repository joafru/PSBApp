spring:
  application:
    name: spring-boot-boilerplate

  jackson:
    default-property-inclusion: non_null

  datasource:
    url: jdbc:mysql://localhost:3306/boilerplate_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}   # 'validate' on production — never drops/alters tables
                                       # set to 'update' only on first run to create the schema
    show-sql: false
    defer-datasource-initialization: true  # run data.sql AFTER Hibernate creates the tables
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: 8080

app:
  jwt:
    # Override via env var JWT_SECRET in production (min 256 bits / 32 chars)
    secret: ${JWT_SECRET:B0il3rpl4t3-S3cr3tK3y-F0r-JWT-Signing-Min256Bits!!}
    expiration: 86400000   # 24 hours in milliseconds

  external-api:
    base-url: ${EXTERNAL_API_URL:https://jsonplaceholder.typicode.com}

  discord:
    webhook-url: ${DISCORD_WEBHOOK_URL:https://discord.com/api/webhooks/YOUR_ID/YOUR_TOKEN}
    username: ${DISCORD_USERNAME:Boilerplate Bot}

logging:
  level:
    com.boilerplate: DEBUG
    org.springframework.security: INFO
